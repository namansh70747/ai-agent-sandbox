{
  "_comment": "CNI bridge plugin for urunc per-tool sandbox network.",
  "_source": "https://urunc.io/design/ (Network handling)",
  "_note": "urunc creates a tap device (tap0_urunc) and connects it via CNI veth.",

  "cniVersion": "1.0.0",
  "name": "urunc-net",
  "type": "bridge",
  "bridge": "urunc0",
  "isGateway": true,
  "ipMasq": true,
  "hairpinMode": true,
  "ipam": {
    "type": "host-local",
    "ranges": [
      [
        {
          "subnet": "10.99.0.0/24",
          "gateway": "10.99.0.1"
        }
      ]
    ],
    "routes": [
      { "dst": "0.0.0.0/0" }
    ]
  }
}
