# configs/k8s/tool-sandbox-deployment.yaml
#
# Example Kubernetes Deployment for the web_tool per-tool sandbox.
# Each tool type runs as a separate Pod with runtimeClassName: urunc.
#
# Sources:
#   https://urunc.io/tutorials/How-to-urunc-on-k8s/
#   https://nubificus.co.uk/blog/urunc_agent/ (Step 2: Running the container)
#
# Apply with:
#   kubectl apply -f configs/k8s/tool-sandbox-deployment.yaml
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-agent-web-tool
  labels:
    app: ai-agent-web-tool
    tool-type: web_tool
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-agent-web-tool
  template:
    metadata:
      labels:
        app: ai-agent-web-tool
        tool-type: web_tool
      annotations:
        # urunc OCI annotations (required)
        # Source: https://urunc.io/package/ (Annotations)
        com.urunc.unikernel.unikernelType: "linux"
        com.urunc.unikernel.hypervisor: "qemu"
        com.urunc.unikernel.binary: "/urunit"
        com.urunc.unikernel.cmdline: ""
        com.urunc.unikernel.mountRootfs: "true"
    spec:
      # Use urunc runtime for this Pod
      # Source: https://urunc.io/tutorials/How-to-urunc-on-k8s/
      runtimeClassName: urunc

      containers:
        - name: web-tool
          image: harbor.nbfc.io/nubificus/urunc/nginx-qemu-linux-raw:latest
          resources:
            requests:
              memory: "256Mi"
              cpu: "500m"
            limits:
              memory: "256Mi"
              cpu: "1"
          # web_tool isolation profile:
          #   - bridge network (for HTTP requests)
          #   - no hostPath mounts
          #   - no privileged access
          securityContext:
            privileged: false
            readOnlyRootFilesystem: false
